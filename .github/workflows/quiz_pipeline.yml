name: Daily Quiz Pipeline

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

jobs:
  produce-quiz:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation de ffmpeg et polices système
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation wget

      - name: Téléchargement de la police Bebas Neue
        run: |
          mkdir -p fonts
          wget -q -O fonts/BebasNeue.ttf \
            "https://github.com/dharmatype/Bebas-Neue/raw/master/Fonts/BN_TTF/BebasNeue-Regular.ttf" \
            || echo "Fallback : police système utilisée"

      - name: Installation des dépendances Python
        run: pip install -r requirements.txt Pillow

      - name: Exécution du pipeline quiz
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python run_quiz_pipeline.py

      - name: Sauvegarde de la vidéo quiz
        uses: actions/upload-artifact@v4
        with:
          name: quiz-video-${{ github.run_number }}
          path: quiz_final.mp4
          retention-days: 7
