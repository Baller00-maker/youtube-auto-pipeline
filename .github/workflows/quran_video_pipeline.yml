name: Daily Quran Video
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}
permissions:
  contents: write   # nécessaire pour commiter quran_history.json (mémoire anti-répétition)
jobs:
  produce-quran-video:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Recuperation du depot
        uses: actions/checkout@v4
      - name: Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installation ffmpeg + polices
        timeout-minutes: 6
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu
          else
            echo "ffmpeg deja present : $(ffmpeg -version | head -1)"
            # fonts-dejavu est presque toujours deja present sur ubuntu-latest,
            # mais on s'assure que la police existe (utilisee pour la carte de titre)
            if [ ! -f /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf ] && \
               [ ! -f /usr/share/fonts/truetype/liberation/LiberationSans-Regular.ttf ]; then
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends fonts-dejavu
            fi
          fi
      - name: Installation dependances Python
        run: pip install -r requirements.txt Pillow
      - name: Execution pipeline complet
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: python run_quran_video_pipeline.py
      - name: Sauvegarde video finale
        uses: actions/upload-artifact@v4
        with:
          name: quran-video-${{ github.run_number }}
          path: quran_video.mp4
          retention-days: 7
      - name: Commit de l'historique (anti-repetition sourate/reciteur)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quran_history.json
          git diff --staged --quiet || git commit -m "Mise a jour historique recitation [skip ci]"
          git push
