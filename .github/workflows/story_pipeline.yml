name: Daily Story Pipeline

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch: {}

jobs:
  produce-and-upload-story:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation de ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Installation des dépendances Python
        run: pip install -r requirements.txt

      - name: Exécution du pipeline histoires
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          STORY_YOUTUBE_CLIENT_ID: ${{ secrets.STORY_YOUTUBE_CLIENT_ID }}
          STORY_YOUTUBE_CLIENT_SECRET: ${{ secrets.STORY_YOUTUBE_CLIENT_SECRET }}
          STORY_YOUTUBE_REFRESH_TOKEN: ${{ secrets.STORY_YOUTUBE_REFRESH_TOKEN }}
        run: python run_story_pipeline.py

      - name: Sauvegarde de la vidéo (pour post manuel TikTok)
        uses: actions/upload-artifact@v4
        with:
          name: story-video-${{ github.run_number }}
          path: story_final.mp4
          retention-days: 7

      - name: Mise à jour des thèmes utilisés
        run: |
          git config user.name "pipeline-bot"
          git config user.email "pipeline-bot@users.noreply.github.com"
          git add story_used_topics.txt
          git diff --staged --quiet || git commit -m "Mise à jour thèmes utilisés [skip ci]"
          git push
